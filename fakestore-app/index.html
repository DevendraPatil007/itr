<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusHub Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo-container">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      <span class="logo-text">NEXUS<span class="logo-accent">HUB</span></span>
    </div>
    
    <div class="action-buttons">
      <button id="loadBtn" class="btn btn-primary">Fetch All Items</button>
      <button id="addBtn" class="btn btn-secondary">Add Random Item</button>
      
      <button id="cartBtn" class="btn btn-cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        Cart (<span id="cartCount">0</span>)
      </button>
    </div>
  </header>

  <main class="dashboard-container">
    <h2 class="section-title">Inventory Management</h2>
    <div id="productList" class="product-grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
